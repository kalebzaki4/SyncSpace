spring.application.name=syncspace-api
server.port=8080
# MySQL Config
spring.datasource.url=jdbc:mysql://localhost:3306/syncspace?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_ROOT_USERNAME:root}
spring.datasource.password=${MYSQL_ROOT_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# JPA Config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Security & API
api.security.token.secret=${JWT_SECRET:32323232323232323232323232323232323232323232323232323232323232323232323232323232323}
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
spring.main.allow-bean-definition-overriding=true